<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>context-bridge — companion UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>context-bridge</h1>
      <p class="sub">read-only GitHub access via MCP. Pick a tool, fill args, run.</p>
      <p id="health" class="health">checking…</p>
    </header>
    <main>
      <section class="panel">
        <label>Tool</label>
        <div id="tool-dd" class="dropdown">
          <button id="tool-btn" class="dropdown-btn" type="button">Select a tool</button>
          <div id="tool-list" class="dropdown-list"></div>
        </div>

        <label for="repo-url">Repository URL</label>
        <input id="repo-url" type="text" class="repo-input" placeholder="https://github.com/owner/repo or owner/repo" spellcheck="false" />

        <label for="args">Arguments <span class="label-hint">(JSON)</span></label>
        <textarea id="args" rows="8" spellcheck="false">{}</textarea>
        <div id="args-help" class="args-help"></div>
        <div class="row">
          <button id="run" type="button">Run</button>
          <span id="status" class="status"></span>
        </div>
      </section>
      <section class="panel">
        <div class="label-row">
          <label>Result</label>
          <button id="copy-btn" class="copy-btn" type="button" title="Copy result">Copy</button>
        </div>
        <pre id="result">—</pre>
      </section>
    </main>
    <footer>
      <a href="https://github.com/chandrabhan-singh-27d/context-bridge" target="_blank" rel="noreferrer noopener">source</a>
    </footer>
    <script src="/app.js" type="module"></script>
  </body>
</html>
