version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      types:
        patterns:
          - '@types/*'
      dev-toolchain:
        patterns:
          - '@biomejs/*'
          - 'typescript'
      mcp:
        patterns:
          - '@modelcontextprotocol/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'ci'
